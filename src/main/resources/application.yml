server:
  port: 8080

spring:
  application:
    name: cloud-disk

  # MySQL DataSource
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/private_aggregator?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: Qq3147096185.

  # Redis Configuration
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
      timeout: 3000ms

  # RabbitMQ Configuration
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 10

  # 文件上传大小限制（匹配前端分片阈值）
  servlet:
    multipart:
      max-file-size: 2GB
      max-request-size: 2GB

# MyBatis Plus Configuration
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Jackson Configuration
jackson:
  date-format: yyyy-MM-dd HH:mm:ss
  time-zone: Asia/Shanghai
  serialization:
    write-dates-as-timestamps: false

# SpringDoc（Knife4j）Configuration
springdoc:
  swagger-ui:
    path: /doc.html                # Knife4j UI 访问路径
    tags-sorter: alpha             # 按字母排序标签
    operations-sorter: alpha       # 按字母排序接口
  api-docs:
    path: /v3/api-docs             # OpenAPI JSON 路径
  group-configs:
    - group: default
      paths-to-match: /api/**
      packages-to-scan: com.cloud.disk.controller

# Sa-Token Configuration
sa-token:
  token-name: cloud_disk_token        # Token name (matches frontend localStorage key)
  timeout: 2592000                     # Token timeout: 30 days (seconds)
  active-timeout: -1                   # No active timeout
  is-concurrent: true                  # Allow concurrent login
  is-share: true                       # Share token across devices
  token-style: uuid                    # UUID-style token
  is-log: false                        # Disable Sa-Token internal logging
  is-print: false                      # Disable Sa-Token console prints

# 本地存储配置（本地磁盘存储版）
cloud-disk:
  storage:
    root-path: D:\cloud-disk-files

# Logging Configuration
logging:
  level:
    root: INFO
    com.cloud.disk: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/cloud-disk.log
    max-size: 10MB
    max-history: 30